<div class="container admin-page">
  <div class="admin-head">
    <h1>Manage Products</h1>
    <a routerLink="/admin/products/new" class="btn btn-primary">+ New Product</a>
  </div>

  <div class="admin-filters">
    <input type="text" [(ngModel)]="titleFilter" placeholder="Search by title..." (keyup.enter)="applyFilters()" />
    <select [(ngModel)]="categoryFilter" (change)="applyFilters()">
      <option value="">All categories</option>
      <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
    </select>
    <button class="btn btn-outline btn-sm" (click)="applyFilters()">Search</button>
  </div>

  <p class="alert alert-error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div class="spinner" *ngIf="loading"></div>

  <div class="admin-table" *ngIf="!loading">
    <div class="table-row table-head">
      <span>Product</span>
      <span>Category</span>
      <span>Price</span>
      <span>Stock</span>
      <span>Actions</span>
    </div>
    <div class="table-row" *ngFor="let p of products">
      <span class="product-cell">
        <img *ngIf="imageSrc(p)" [src]="imageSrc(p)" [alt]="p.title" />
        <span>{{ p.title }}</span>
      </span>
      <span class="capitalize">{{ p.category }}</span>
      <span>${{ p.price }}</span>
      <span>{{ p.stock }}</span>
      <span class="actions-cell">
        <a class="btn btn-outline btn-sm" [routerLink]="['/admin/products', p._id, 'edit']">Edit</a>
        <button class="btn btn-danger btn-sm" [disabled]="deletingId === p._id" (click)="remove(p)">
          {{ deletingId === p._id ? 'Deleting...' : 'Delete' }}
        </button>
      </span>
    </div>
    <p class="empty-state" *ngIf="products.length === 0">No products found.</p>
  </div>

  <app-pagination [page]="page" [hasNextPage]="hasNextPage" (pageChange)="onPageChange($event)"></app-pagination>
</div>
